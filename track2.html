<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Qua — Sphere Chamber</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
touch-action:manipulation;
}

#stars{
position:absolute;
z-index:1;
}

#threeCanvas{
position:absolute;
top:0;
left:0;
z-index:3;
cursor:pointer;
}

/* TAP ACTIVATION SCREEN */

#tapOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;

display:flex;
justify-content:center;
align-items:center;

color:white;
z-index:20;
font-family:Georgia,serif;

padding:40px;
box-sizing:border-box;

pointer-events:auto;
touch-action:none;
}

#tapText{
max-width:720px;
width:100%;
text-align:center;
line-height:1.6;
font-size:18px;
margin:auto;
}

#return{
position:fixed;
bottom:28px;
left:50%;
transform:translateX(-50%);
z-index:5;
}

button{
border:1px solid rgba(255,255,255,.3);
background:black;
color:white;
font-family:Georgia,serif;
letter-spacing:2px;
font-size:12px;
padding:10px 16px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="tapOverlay">
<div id="tapText">

<p>
There is but one awake consciousness.<br><br>
Every number greater than one is but a measure of its own iteration.<br>
Symbol zero signifies the infinite womb where “no-thing” is in the capacity of all creation.
</p>

<p>
0 qua 1 — no-thing becoming conscious form.<br>
1 qua 0 — consciousness as infinity.
</p>

<br>
<p>(tap anywhere)</p>

</div>
</div>

<canvas id="stars"></canvas>

<div id="return">
<button onclick="location.href='index.html'">Return</button>
</div>

<audio id="music" src="Track2_NewSong.mp3" loop playsinline preload="auto"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>

/* AUDIO VARIABLES */

const music=document.getElementById("music")
music.volume=0.16

let audioCtx
let analyser
let source

let bassLevel=0
let highLevel=0

let audioStarted=false


/* TAP SCREEN */

const tapOverlay=document.getElementById("tapOverlay")

tapOverlay.addEventListener("pointerdown",startExperience)

function startExperience(){

if(audioStarted) return
audioStarted=true

audioCtx=new (window.AudioContext||window.webkitAudioContext)()
analyser=audioCtx.createAnalyser()

source=audioCtx.createMediaElementSource(music)

source.connect(analyser)
analyser.connect(audioCtx.destination)

analyser.fftSize=2048

audioCtx.resume()

music.currentTime=0
music.play()

animate()

tapOverlay.style.display="none"

}


/* STARFIELD */

const canvas=document.getElementById("stars")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

function buildStars(){
stars=[]
for(let i=0;i<1888;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:0.15+Math.random()*0.1,
dir:Math.random()<0.5?1:-1
})
}
}

buildStars()


/* POINTER */

let pointerX=canvas.width/2
let pointerY=canvas.height/2

function updatePointer(x,y){
pointerX=x
pointerY=y
}

window.addEventListener("pointermove",e=>{
updatePointer(e.clientX,e.clientY)
})

window.addEventListener("touchmove",e=>{
updatePointer(e.touches[0].clientX,e.touches[0].clientY)
})


/* THREE SCENE */

const scene=new THREE.Scene()

const portalGroup=new THREE.Group()
scene.add(portalGroup)

const camera=new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer=new THREE.WebGLRenderer({alpha:true})
renderer.setPixelRatio(window.devicePixelRatio)
renderer.setSize(window.innerWidth,window.innerHeight)

renderer.domElement.id="threeCanvas"
document.body.appendChild(renderer.domElement)


/* STAR REFLECTION */

const starTexture=new THREE.CanvasTexture(canvas)
starTexture.mapping=THREE.EquirectangularReflectionMapping


/* SPHERE */

const sphereTextureCanvas=document.createElement("canvas")
sphereTextureCanvas.width=512
sphereTextureCanvas.height=512
const stx=sphereTextureCanvas.getContext("2d")

for(let i=0;i<6000;i++){
stx.fillStyle="rgba(255,255,255,0.02)"
stx.fillRect(Math.random()*512,Math.random()*512,2,2)
}

const sphereTexture=new THREE.CanvasTexture(sphereTextureCanvas)

const geometry=new THREE.SphereGeometry(0.5,64,64)

const material=new THREE.MeshPhysicalMaterial({
color:0x106888,
metalness:1,
roughness:0.05,
map:sphereTexture,
envMap:starTexture,
envMapIntensity:3.2,
clearcoat:1,
clearcoatRoughness:0.05
})

const sphere=new THREE.Mesh(geometry,material)
portalGroup.add(sphere)

sphere.rotation.z=0.05


/* CLOUDS */

const cloudGeometry=new THREE.SphereGeometry(0.505,64,64)

const cloudCanvas=document.createElement("canvas")
cloudCanvas.width=512
cloudCanvas.height=512

const cloudCtx=cloudCanvas.getContext("2d")

for(let i=0;i<20000;i++){
cloudCtx.fillStyle="rgba(255,255,255,0.3)"
cloudCtx.fillRect(Math.random()*512,Math.random()*512,2,2)
}

const cloudTexture=new THREE.CanvasTexture(cloudCanvas)

const cloudMaterial=new THREE.MeshBasicMaterial({
map:cloudTexture,
transparent:true,
opacity:0.23
})

const clouds=new THREE.Mesh(cloudGeometry,cloudMaterial)
portalGroup.add(clouds)


/* GLOW */

const glowGeometry=new THREE.SphereGeometry(0.63,64,64)

const glowMaterial=new THREE.MeshBasicMaterial({
color:0xff66cc,
transparent:true,
opacity:0.08,
blending:THREE.AdditiveBlending
})

const glow=new THREE.Mesh(glowGeometry,glowMaterial)
portalGroup.add(glow)


/* PLASMA */

const plasmaCanvas=document.createElement("canvas")
plasmaCanvas.width=512
plasmaCanvas.height=512

const pctx=plasmaCanvas.getContext("2d")

const pgrad=pctx.createRadialGradient(256,256,30,256,256,256)

pgrad.addColorStop(0,"rgba(255,90,220,0.75)")
pgrad.addColorStop(0.25,"rgba(255,60,190,0.55)")
pgrad.addColorStop(0.55,"rgba(220,40,210,0.38)")
pgrad.addColorStop(0.8,"rgba(150,20,200,0.25)")
pgrad.addColorStop(1,"rgba(255,90,220,0)")

pctx.fillStyle=pgrad
pctx.fillRect(0,0,512,512)

const plasmaTexture=new THREE.CanvasTexture(plasmaCanvas)

const plasmaMaterial=new THREE.MeshBasicMaterial({
map:plasmaTexture,
transparent:true,
opacity:0.23,
blending:THREE.AdditiveBlending
})

const plasma=new THREE.Mesh(
new THREE.SphereGeometry(0.72,64,64),
plasmaMaterial
)

portalGroup.add(plasma)

const plasma2=plasma.clone()
plasma2.rotation.y=Math.PI
portalGroup.add(plasma2)


/* LIGHT */

const light=new THREE.PointLight(0xffffff,1.8)
light.position.set(2,3,4)
scene.add(light)

camera.position.z=3


/* ANIMATION */

let rotationY=0
let bassPulse=0
let starAngle=0

function animate(){

requestAnimationFrame(animate)

if(!audioStarted) return

const data=new Uint8Array(analyser.frequencyBinCount)
analyser.getByteFrequencyData(data)

starAngle+=0.0003

ctx.clearRect(0,0,canvas.width,canvas.height)

stars.forEach(s=>{

s.y+=s.speed*s.dir

if(s.y>canvas.height){s.y=0}
if(s.y<0){s.y=canvas.height}

ctx.beginPath()
ctx.arc(s.x,s.y,s.size,0,Math.PI*2)
ctx.fillStyle="white"
ctx.fill()

})

starTexture.needsUpdate=true

rotationY+=0.0015

sphere.rotation.y=rotationY
clouds.rotation.y=-rotationY*0.6

renderer.render(scene,camera)

}

</script>

</body>
</html>
