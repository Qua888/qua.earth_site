<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Qua — Sphere Chamber</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
touch-action:manipulation;
}

#stars{
position:absolute;
z-index:1;
}

#threeCanvas{
position:absolute;
top:0;
left:0;
z-index:3;
cursor:pointer;
}

/* TAP ACTIVATION SCREEN */

#tapOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;

display:flex;
justify-content:center;
align-items:center;

color:white;
z-index:20;
font-family:Georgia,serif;

padding:40px;
box-sizing:border-box;
}

#tapText{
max-width:720px;
width:100%;
text-align:center;
line-height:1.6;
font-size:18px;
margin:auto;
}

#return{
position:fixed;
bottom:28px;
left:50%;
transform:translateX(-50%);
z-index:5;
}

button{
border:1px solid rgba(255,255,255,.3);
background:black;
color:white;
font-family:Georgia,serif;
letter-spacing:2px;
font-size:12px;
padding:10px 16px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- TAP SCREEN -->

<div id="tapOverlay">

<div id="tapText">

<p>
There is but one awake consciousness.  <br><br>
Every number greater than one is but a measure of its own iteration. <br>
Symbol zero signifies the infinite womb where “no-thing” is in the capacity of all creation.
</p>



<p>
0 qua 1 — no-thing becoming conscious form.<br>
1 qua 0 — consciousness as infinity.
</p>

<br>
<p>(tap anywhere)</p>

</div>

</div>

<canvas id="stars"></canvas>

<div id="return">
<button onclick="location.href='index.html'">Return</button>
</div>

<audio id="music" loop playsinline>
<source src="Track2_NewSong.mp3" type="audio/mpeg">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>

/* AUDIO */

const music=document.getElementById("music")
music.volume=0.16

const audioCtx=new (window.AudioContext||window.webkitAudioContext)()
const analyser=audioCtx.createAnalyser()

let source=null

analyser.fftSize=2048
const data=new Uint8Array(analyser.frequencyBinCount)

let bassLevel=0
let highLevel=0

function connectAudio(){

if(!source){

source=audioCtx.createMediaElementSource(music)
source.connect(analyser)
analyser.connect(audioCtx.destination)

}

}

/* TAP SCREEN AUDIO UNLOCK */

const tapOverlay=document.getElementById("tapOverlay")

function startExperience(){

connectAudio()

audioCtx.resume()

music.play().catch(()=>{})

tapOverlay.style.display="none"

}

tapOverlay.addEventListener("click",startExperience)
tapOverlay.addEventListener("touchstart",startExperience)

/* STARFIELD */

const canvas=document.getElementById("stars")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

function buildStars(){
stars=[]
for(let i=0;i<1888;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:0.15+Math.random()*0.1,
dir:Math.random()<0.5?1:-1
})
}
}

buildStars()

/* POINTER */

let pointerX=canvas.width/2
let pointerY=canvas.height/2

function updatePointer(x,y){
pointerX=x
pointerY=y
}

window.addEventListener("mousemove",(e)=>{
updatePointer(e.clientX,e.clientY)
})

window.addEventListener("click",(e)=>{
updatePointer(e.clientX,e.clientY)
})

window.addEventListener("touchstart",(e)=>{
updatePointer(e.touches[0].clientX,e.touches[0].clientY)
})

window.addEventListener("touchmove",(e)=>{
updatePointer(e.touches[0].clientX,e.touches[0].clientY)
})

/* THREE SCENE */

const scene=new THREE.Scene()

const portalGroup=new THREE.Group()
scene.add(portalGroup)

const camera=new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer=new THREE.WebGLRenderer({alpha:true})
renderer.setPixelRatio(window.devicePixelRatio)
renderer.setSize(window.innerWidth,window.innerHeight)

renderer.domElement.id="threeCanvas"
document.body.appendChild(renderer.domElement)

/* STAR REFLECTION */

const starTexture=new THREE.CanvasTexture(canvas)
starTexture.mapping=THREE.EquirectangularReflectionMapping

/* SPHERE */

const sphereTextureCanvas=document.createElement("canvas")
sphereTextureCanvas.width=512
sphereTextureCanvas.height=512
const stx=sphereTextureCanvas.getContext("2d")

for(let i=0;i<6000;i++){
stx.fillStyle="rgba(255,255,255,0.02)"
stx.fillRect(Math.random()*512,Math.random()*512,2,2)
}

const sphereTexture=new THREE.CanvasTexture(sphereTextureCanvas)

const geometry=new THREE.SphereGeometry(0.5,64,64)

const material=new THREE.MeshPhysicalMaterial({
color:0x106888,
metalness:1,
roughness:0.05,
map:sphereTexture,
envMap:starTexture,
envMapIntensity:3.2,
clearcoat:1,
clearcoatRoughness:0.05
})

const sphere=new THREE.Mesh(geometry,material)
portalGroup.add(sphere)

sphere.rotation.z=0.05

/* CLOUDS */

const cloudGeometry=new THREE.SphereGeometry(0.505,64,64)

const cloudCanvas=document.createElement("canvas")
cloudCanvas.width=512
cloudCanvas.height=512

const cloudCtx=cloudCanvas.getContext("2d")

for(let i=0;i<20000;i++){
cloudCtx.fillStyle="rgba(255,255,255,0.3)"
cloudCtx.fillRect(Math.random()*512,Math.random()*512,2,2)
}

const cloudTexture=new THREE.CanvasTexture(cloudCanvas)

const cloudMaterial=new THREE.MeshBasicMaterial({
map:cloudTexture,
transparent:true,
opacity:0.23
})

const clouds=new THREE.Mesh(cloudGeometry,cloudMaterial)
portalGroup.add(clouds)

/* GLOW */

const glowGeometry=new THREE.SphereGeometry(0.63,64,64)

const glowMaterial=new THREE.MeshBasicMaterial({
color:0xff66cc,
transparent:true,
opacity:0.08,
blending:THREE.AdditiveBlending
})

const glow=new THREE.Mesh(glowGeometry,glowMaterial)
portalGroup.add(glow)

/* PLASMA */

const plasmaCanvas=document.createElement("canvas")
plasmaCanvas.width=512
plasmaCanvas.height=512

const pctx=plasmaCanvas.getContext("2d")

const pgrad=pctx.createRadialGradient(256,256,30,256,256,256)

pgrad.addColorStop(0,"rgba(255,90,220,0.75)")
pgrad.addColorStop(0.25,"rgba(255,60,190,0.55)")
pgrad.addColorStop(0.55,"rgba(220,40,210,0.38)")
pgrad.addColorStop(0.8,"rgba(150,20,200,0.25)")
pgrad.addColorStop(1,"rgba(255,90,220,0)")

pctx.fillStyle=pgrad
pctx.fillRect(0,0,512,512)

const plasmaTexture=new THREE.CanvasTexture(plasmaCanvas)

const plasmaMaterial=new THREE.MeshBasicMaterial({
map:plasmaTexture,
transparent:true,
opacity:0.23,
blending:THREE.AdditiveBlending
})

const plasma=new THREE.Mesh(
new THREE.SphereGeometry(0.72,64,64),
plasmaMaterial
)

plasma.position.z=-0.05
portalGroup.add(plasma)

const plasma2=plasma.clone()
plasma2.position.z=0.05
plasma2.rotation.y=Math.PI

portalGroup.add(plasma2)

/* LIGHT */

const light=new THREE.PointLight(0xffffff,1.8)
light.position.set(2,3,4)
scene.add(light)

camera.position.z=3

/* MOBILE POSITION FIX */

function updatePortalAlignment(){

if(window.innerWidth < 768){

portalGroup.position.y=-0.26

}else{

portalGroup.position.y=0

}

}

updatePortalAlignment()

/* CLICK SPHERE */

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

renderer.domElement.addEventListener("click",(event)=>{

mouse.x=(event.clientX/window.innerWidth)*2-1
mouse.y=-(event.clientY/window.innerHeight)*2+1

raycaster.setFromCamera(mouse,camera)

const intersects=raycaster.intersectObject(sphere)

if(intersects.length>0){

if(music.paused){
music.play()
}else{
music.pause()
}

}

})

/* ANIMATION */

let rotationY=0
let bassPulse=0
let starAngle=0

function animate(){

requestAnimationFrame(animate)

analyser.getByteFrequencyData(data)

let bassSum=0,bassCount=0
let highSum=0,highCount=0

for(let i=0;i<data.length;i++){

const freq=i*(audioCtx.sampleRate/2)/data.length

if(freq<=108){
bassSum+=data[i]
bassCount++
}

if(freq>=900){
highSum+=data[i]
highCount++
}

}

bassLevel=(bassSum/bassCount)/255
highLevel=(highSum/highCount)/255

starAngle+=0.0003

ctx.clearRect(0,0,canvas.width,canvas.height)

const cx=canvas.width/2
const cy=canvas.height/2
const bubbleRadius=333

stars.forEach(s=>{

s.y+=s.speed*s.dir*(1+highLevel*2)

if(s.dir===1 && s.y>canvas.height){
s.y=0
s.x=Math.random()*canvas.width
}

if(s.dir===-1 && s.y<0){
s.y=canvas.height
s.x=Math.random()*canvas.width
}

const dx=s.x-cx
const dy=s.y-cy

const cosA=Math.cos(starAngle)
const sinA=Math.sin(starAngle)

const rotatedX=dx*cosA-dy*sinA
const rotatedY=dx*sinA+dy*cosA

s.x=cx+rotatedX
s.y=cy+rotatedY

const dxp=s.x-pointerX
const dyp=s.y-pointerY
const distp=Math.sqrt(dxp*dxp+dyp*dyp)

if(distp<bubbleRadius && distp>0.001){

const force=(bubbleRadius-distp)/bubbleRadius

s.x+=dxp/distp*force*7
s.y+=dyp/distp*force*7

}

ctx.beginPath()
ctx.arc(s.x,s.y,s.size*(1+highLevel*2),0,Math.PI*2)
ctx.fillStyle=`rgba(255,255,255,${0.68+highLevel})`
ctx.fill()

})

starTexture.needsUpdate=true

rotationY+=0.0015

sphere.rotation.y=rotationY
sphere.rotation.x=Math.sin(rotationY*0.2)*0.1

clouds.rotation.y=-rotationY*0.6
clouds.rotation.x=Math.sin(rotationY*0.15)*0.1

if(bassLevel>bassPulse){
bassPulse=bassLevel
}

bassPulse*=0.88

const scale=1+bassPulse*0.35

sphere.scale.set(scale,scale,scale)
clouds.scale.set(scale,scale,scale)
glow.scale.set(scale*1.1,scale*1.1,scale*1.1)

plasma.rotation.y+=0.0016
plasma.rotation.x+=0.00035

plasma2.rotation.y-=0.0016
plasma2.rotation.x-=0.00035

let plasmaSize=1.2

if(window.innerWidth<768){
plasmaSize=1.0
}

plasma.scale.set(scale*plasmaSize,scale*plasmaSize,scale*plasmaSize)
plasma2.scale.set(scale*plasmaSize,scale*plasmaSize,scale*plasmaSize)

renderer.render(scene,camera)

}

animate()

/* RESIZE */

window.addEventListener("resize",()=>{

canvas.width=window.innerWidth
canvas.height=window.innerHeight

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

buildStars()

pointerX=canvas.width/2
pointerY=canvas.height/2

updatePortalAlignment()

})

/* ORIENTATION */

window.addEventListener("orientationchange",()=>{

setTimeout(()=>{

canvas.width=window.innerWidth
canvas.height=window.innerHeight

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

buildStars()

pointerX=canvas.width/2
pointerY=canvas.height/2

updatePortalAlignment()

},200)

})

</script>

</body>
</html>
