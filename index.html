<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Qua</title>

<style>

body{
margin:0;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(
to top,
#ff4e50,
#ff6a88,
#ff8a8a,
#ea2f2f,
#efc75b
);

touch-action:manipulation;
}

/* keep portal layers non-clickable except what we explicitly allow */
body *:not(.triangle):not(#tapScreen):not(#navBar):not(#navBar *){
pointer-events:none;
}

.triangle{
pointer-events:auto;
}

/* TAP SCREEN */

#tapScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

color:white;
font-family:Georgia,serif;
font-size:22px;
letter-spacing:3px;
line-height:1.8;

z-index:100;
cursor:pointer;

transition:opacity 1.5s ease;
text-align:center;
pointer-events:auto;
}

/* TOP / SIDE NAV */

#navBar{
position:fixed;
top:0;
left:0;
width:100%;
height:52px;
background:black;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:0 12px;
box-sizing:border-box;
z-index:20;
pointer-events:auto;
}

.navButton{
appearance:none;
-webkit-appearance:none;
border:none;
background:transparent;
color:white;
font-family:Georgia,serif;
font-size:12px;
letter-spacing:1.5px;
padding:8px 10px;
cursor:pointer;
pointer-events:auto;
white-space:nowrap;
opacity:0.92;
transition:opacity 0.25s ease, transform 0.25s ease;
}

.navButton:hover,
.navButton:active{
opacity:1;
transform:scale(1.03);
}

/* MESSAGE */

#quaField{
position:fixed;
top:92px;
left:50%;
transform:translateX(-50%);

font-family:Georgia,serif;
letter-spacing:2px;
font-size:18px;

color:black;

opacity:0;
pointer-events:none;

z-index:10;

transition:opacity 6s ease;
text-align:center;
}

/* FOOTER */

#comingSoon{
position:fixed;
bottom:28px;
left:50%;
transform:translateX(-50%);

font-family:Georgia,serif;
letter-spacing:2px;
font-size:14px;

color:black;
opacity:0.6;

pointer-events:none;

z-index:10;

text-align:center;
}

/* canvas layers */

canvas{
position:absolute;
pointer-events:none;
}

#stars{z-index:0}
#flowerFloor{z-index:1}
#bottomRing{z-index:2}
.triangle{z-index:3}
#topRing{z-index:4}

/* SACRED GEOMETRY FLOOR */

#flowerFloor{
position:absolute;
top:68%;
left:50%;
width:664px;
transform:
translate(-50%,-464px)
perspective(900px)
rotateX(68deg);
opacity:0.25;
pointer-events:none;
z-index:1;
}

/* triangle */

.triangle{
position:absolute;
width:0;
height:0;

border-left:120px solid transparent;
border-right:120px solid transparent;
border-bottom:200px solid black;

animation:breathe 12s ease-in-out infinite alternate;
cursor:pointer;
}

/* glow */

.triangle::after{
content:"";
position:absolute;
left:-160px;
top:-120px;
width:320px;
height:320px;
background:radial-gradient(circle, rgba(255,150,200,0.25), transparent 70%);
filter:blur(40px);
z-index:-1;
}

@keyframes breathe{
0%{transform:scale(1)}
50%{transform:scale(1.16)}
100%{transform:scale(1)}
}

/* MOBILE PORTRAIT */

@media (max-width:768px) and (orientation:portrait){

#navBar{
top:0;
left:0;
width:100%;
height:50px;
flex-direction:row;
justify-content:center;
gap:4px;
padding:0 4px;
}

.navButton{
font-size:10px;
letter-spacing:1px;
padding:6px 6px;
}

.triangle{
border-left:70px solid transparent;
border-right:70px solid transparent;
border-bottom:120px solid black;
}

#flowerFloor{
width:286px;
transform:
translate(-50%,-163px)
perspective(900px)
rotateX(68deg);
}

#quaField{
top:76px;
font-size:14px;
width:90%;
}

#comingSoon{
font-size:12px;
width:90%;
}

}

/* MOBILE LANDSCAPE = LEFT SIDEBAR */

@media (max-width:950px) and (orientation:landscape){

#navBar{
top:0;
left:0;
width:160px;
height:100vh;
flex-direction:column;
justify-content:center;
align-items:center;
gap:14px;
padding:20px 10px;
}

.navButton{
font-size:12px;
padding:8px 6px;
text-align:center;
}

#quaField{
top:36px;
left:calc(50% + 40px);
transform:translateX(-50%);
}

}

/* DESKTOP */

@media (min-width:769px){

#navBar{
top:0;
left:0;
width:100%;
height:52px;
flex-direction:row;
justify-content:center;
gap:16px;
padding:0 20px;
}

.navButton{
font-size:12px;
letter-spacing:1.6px;
padding:8px 12px;
}

}

</style>
</head>

<body>

<div id="tapScreen">
<div>! You've arrived !</div><br>
<div>Enter</div>
<div>Aligned</div>
<div>Harmonic</div>
<div>Celebration</div>
</div>

<nav id="navBar">
<button class="navButton" id="btnAmulets">Infinity Amuletes</button>
<button class="navButton" id="btnYoutube">YouTube</button>
<button class="navButton" id="btnNFTs">Music NFTs</button>
<button class="navButton" id="btnGame">Fun Game</button>
</nav>

<div id="quaField">
One is now invited to experience<br>
Joy<br>
Qua<br>
Peace & Elegant Vitality
</div>

<div id="comingSoon">
More to come very soon...
</div>

<canvas id="stars"></canvas>

<img id="flowerFloor" src="./outer_ring_torus_flower.svg">

<canvas id="bottomRing"></canvas>

<div class="triangle"></div>

<canvas id="topRing"></canvas>

<audio id="music" loop>
<source src="Qua_basecamp_New_Paradigm.mp3" type="audio/mpeg">
</audio>

<script>

/* AUDIO */

const music=document.getElementById("music")
const tapScreen=document.getElementById("tapScreen")
const triangle=document.querySelector(".triangle")
const quaField=document.getElementById("quaField")

music.volume=0.25

const audioCtx=new (window.AudioContext || window.webkitAudioContext)()
const analyser=audioCtx.createAnalyser()
const source=audioCtx.createMediaElementSource(music)

source.connect(analyser)
analyser.connect(audioCtx.destination)

analyser.fftSize=128

const audioData=new Uint8Array(analyser.frequencyBinCount)

let bassLevel=0
let sparkleLevel=0

/* NAV BUTTONS */

const btnAmulets=document.getElementById("btnAmulets")
const btnYoutube=document.getElementById("btnYoutube")
const btnNFTs=document.getElementById("btnNFTs")
const btnGame=document.getElementById("btnGame")

btnAmulets.addEventListener("click",()=>{
alert("Infinity Amuletes section coming soon")
})

btnYoutube.addEventListener("click",()=>{
alert("YouTube section coming soon")
})

btnNFTs.addEventListener("click",()=>{
alert("Music NFTs section coming soon")
})

btnGame.addEventListener("click",()=>{
alert("Fun Game coming soon")
})

/* POINTER (mouse + touch) */

let pointer={
x:window.innerWidth/2,
y:window.innerHeight/2
}

window.addEventListener("pointermove",(e)=>{
pointer.x=e.clientX
pointer.y=e.clientY
})

window.addEventListener("pointerdown",(e)=>{
pointer.x=e.clientX
pointer.y=e.clientY
})

function updateAudio(){

analyser.getByteFrequencyData(audioData)

let bassSum=0
for(let i=0;i<10;i++){
bassSum+=audioData[i]
}

bassLevel=bassSum/10/255

let sparkleSum=0
for(let i=20;i<40;i++){
sparkleSum+=audioData[i]
}

sparkleLevel=sparkleSum/20/255

requestAnimationFrame(updateAudio)

}

/* TAP SCREEN */

tapScreen.addEventListener("click",()=>{

audioCtx.resume()
music.play()
updateAudio()

tapScreen.style.opacity="0"

setTimeout(()=>{
tapScreen.style.display="none"
},1500)

setTimeout(()=>{
quaField.style.opacity="1"
},900)

setTimeout(()=>{
quaField.style.opacity="0"
},13000)

})

/* TRIANGLE PLAY PAUSE */

function toggleAudio(){

if(audioCtx.state==="suspended"){
audioCtx.resume()
}

if(music.paused){
music.play()
}else{
music.pause()
}

}

triangle.addEventListener("pointerdown",(e)=>{

const rect=triangle.getBoundingClientRect()

const x=e.clientX-rect.left
const y=e.clientY-rect.top

const width=rect.width
const height=rect.height

const leftEdge=(width/2)-(width/2)*(1-y/height)
const rightEdge=(width/2)+(width/2)*(1-y/height)

if(y<0 || y>height || x<leftEdge || x>rightEdge){
return
}

e.preventDefault()
toggleAudio()

})

/* STARFIELD */

const starCanvas=document.getElementById("stars")
const starCtx=starCanvas.getContext("2d")

starCanvas.width=window.innerWidth
starCanvas.height=window.innerHeight

let stars=[]

for(let i=0;i<1444;i++){

let direction=Math.random()<0.5?-1:1

stars.push({
x:Math.random()*starCanvas.width,
y:Math.random()*starCanvas.height,
size:Math.random()*2,
speed:(0.1+Math.random()*0.1)*direction
})

}

function drawStars(){

starCtx.clearRect(0,0,starCanvas.width,starCanvas.height)

stars.forEach(s=>{

s.y+=s.speed

if(s.y>starCanvas.height){
s.y=0
s.x=Math.random()*starCanvas.width
}

if(s.y<0){
s.y=starCanvas.height
s.x=Math.random()*starCanvas.width
}

let dx=pointer.x-s.x
let dy=pointer.y-s.y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<150){
s.x-=dx*0.03
s.y-=dy*0.03
}

let glow=(0.36 + sparkleLevel*0.84)

starCtx.beginPath()
starCtx.arc(s.x,s.y,s.size,0,Math.PI*2)
starCtx.fillStyle=`rgba(255,255,255,${glow})`
starCtx.fill()

})

requestAnimationFrame(drawStars)

}

drawStars()

/* TORUS */

function createRing(canvasId,offset,reverse=false,scale=1){

const canvas=document.getElementById(canvasId)
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

class Particle{

constructor(){

this.angle=Math.random()*Math.PI*2
this.radius=(150+Math.random()*40)*scale
this.baseSpeed=(0.0060+Math.random()*0.0060)*(reverse?-1:1)
this.size=Math.random()*2+1

}

update(){

let speed=this.baseSpeed

const centerX=canvas.width/2
const centerY=canvas.height/2+offset

let x=centerX+Math.cos(this.angle)*this.radius
let y=centerY+Math.sin(this.angle)*this.radius*0.35

let dx=pointer.x-x
let dy=pointer.y-y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<180){
speed*=0.43
}

this.angle+=speed

}

draw(){

const centerX=canvas.width/2
const centerY=canvas.height/2+offset

let dynamicRadius=this.radius+bassLevel*35

let x=centerX+Math.cos(this.angle)*dynamicRadius
let y=centerY+Math.sin(this.angle)*dynamicRadius*0.35

ctx.beginPath()
ctx.arc(x,y,this.size,0,Math.PI*2)

ctx.fillStyle="rgba(255,180,220,0.8)"
ctx.shadowBlur=12
ctx.shadowColor="pink"

ctx.fill()

}

}

for(let i=0;i<234;i++){
particles.push(new Particle())
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{
p.update()
p.draw()
})

requestAnimationFrame(animate)

}

animate()

}

createRing("bottomRing",96,false,1.16)
createRing("topRing",-68,true,1)

/* RESIZE */

window.addEventListener("resize",()=>{

starCanvas.width=window.innerWidth
starCanvas.height=window.innerHeight

})

</script>

</body>
</html>
