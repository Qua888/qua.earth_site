<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Qua</title>

<style>

body{
margin:0;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(
to top,
#ff4e50,
#ff6a88,
#ff8a8a,
#ea2f2f,
#efc75b
);

touch-action:manipulation;
}

/* keep portal layers non-clickable except what we explicitly allow */
body *:not(.triangle):not(#tapScreen):not(#navBar):not(#navBar *):not(#gameOverlay):not(#gameOverlay *):not(#nextTrack):not(#nextTrack *){
pointer-events:none;
}

.triangle{
pointer-events:auto;
}

/* TAP SCREEN */

#tapScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

color:white;
font-family:Georgia,serif;
font-size:22px;
letter-spacing:3px;
line-height:1.8;

z-index:100;
cursor:pointer;

transition:opacity 1.5s ease;
text-align:center;
pointer-events:auto;
}

/* TOP / SIDE NAV */

#navBar{
position:fixed;
top:0;
left:0;
width:100%;
height:52px;
background:black;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:0 12px;
box-sizing:border-box;
z-index:20;
pointer-events:auto;
}

.navButton{
appearance:none;
-webkit-appearance:none;
border:none;
background:transparent;
color:white;
font-family:Georgia,serif;
font-size:12px;
letter-spacing:1.5px;
padding:8px 10px;
cursor:pointer;
pointer-events:auto;
white-space:nowrap;
opacity:0.92;
transition:opacity 0.25s ease, transform 0.25s ease;
}

.navButton:hover,
.navButton:active{
opacity:1;
transform:scale(1.03);
}

/* MESSAGE */

#quaField{
position:fixed;
top:92px;
left:50%;
transform:translateX(-50%);

font-family:Georgia,serif;
letter-spacing:2px;
font-size:18px;

color:black;

opacity:0;
pointer-events:none;

z-index:10;

transition:opacity 6s ease;
text-align:center;
}

/* FOOTER */

#comingSoon{
position:fixed;
bottom:28px;
left:50%;
transform:translateX(-50%);

font-family:Georgia,serif;
letter-spacing:2px;
font-size:14px;

color:black;
opacity:0.6;

pointer-events:none;

z-index:10;

text-align:center;
}

/* canvas layers */

canvas{
position:absolute;
pointer-events:none;
}

#stars{z-index:0}
#flowerFloor{z-index:1}
#bottomRing{z-index:2}
.triangle{z-index:3}
#topRing{z-index:4}

/* SACRED GEOMETRY FLOOR */

#flowerFloor{
position:absolute;
top:68%;
left:50%;
width:664px;
transform:
translate(-50%,-464px)
perspective(900px)
rotateX(68deg);
opacity:0.25;
pointer-events:none;
z-index:1;
}

/* triangle */

.triangle{
position:absolute;
width:0;
height:0;

border-left:120px solid transparent;
border-right:120px solid transparent;
border-bottom:200px solid black;

animation:breathe 12s ease-in-out infinite alternate;
cursor:pointer;
}

/* glow */

.triangle::after{
content:"";
position:absolute;
left:-160px;
top:-120px;
width:320px;
height:320px;
background:radial-gradient(circle, rgba(255,150,200,0.25), transparent 70%);
filter:blur(40px);
z-index:-1;
}

@keyframes breathe{
0%{transform:scale(1)}
50%{transform:scale(1.16)}
100%{transform:scale(1)}
}

/* GAME OVERLAY */

#gameOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.94);
z-index:200;
display:none;
pointer-events:auto;
}

#gameOverlay.active{
display:block;
}

#gameCanvas{
position:absolute;
inset:0;
width:100%;
height:100%;
pointer-events:none;
}

#gameUI{
position:absolute;
top:16px;
left:16px;
right:16px;
display:flex;
justify-content:space-between;
align-items:flex-start;
z-index:3;
pointer-events:none;
}

#gameStats{
color:white;
font-family:Georgia,serif;
letter-spacing:2px;
font-size:14px;
line-height:1.8;
pointer-events:none;
}

#gameButtons{
display:flex;
gap:10px;
pointer-events:auto;
}

.gameBtn{
appearance:none;
-webkit-appearance:none;
border:1px solid rgba(255,255,255,0.28);
background:black;
color:white;
font-family:Georgia,serif;
letter-spacing:1.5px;
font-size:12px;
padding:10px 12px;
cursor:pointer;
pointer-events:auto;
}

#gameCenterMessage{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
font-family:Georgia,serif;
letter-spacing:2px;
line-height:1.9;
z-index:3;
pointer-events:none;
}

#gameCenterMessage.hidden{
display:none;
}

#touchControls{
position:absolute;
inset:0;
display:none;
z-index:2;
pointer-events:auto;
}

#touchLeft,
#touchRight{
position:absolute;
top:0;
bottom:0;
width:50%;
pointer-events:auto;
}

#touchLeft{left:0;}
#touchRight{right:0;}

#touchHint{
position:absolute;
bottom:24px;
left:50%;
transform:translateX(-50%);
color:rgba(255,255,255,0.7);
font-family:Georgia,serif;
letter-spacing:2px;
font-size:12px;
text-align:center;
pointer-events:none;
z-index:3;
}

/* MOBILE PORTRAIT */

@media (max-width:768px) and (orientation:portrait){

#navBar{
top:0;
left:0;
width:100%;
height:50px;
flex-direction:row;
justify-content:center;
gap:4px;
padding:0 4px;
}

.navButton{
font-size:10px;
letter-spacing:1px;
padding:6px 6px;
}

.triangle{
border-left:70px solid transparent;
border-right:70px solid transparent;
border-bottom:120px solid black;
}

#flowerFloor{
width:286px;
transform:
translate(-50%,-163px)
perspective(900px)
rotateX(68deg);
}

#quaField{
top:76px;
font-size:14px;
width:90%;
}

#comingSoon{
font-size:12px;
width:90%;
}

#gameStats{
font-size:12px;
}

.gameBtn{
font-size:11px;
padding:8px 10px;
}

}

/* DESKTOP + LARGE SCREENS */

@media (min-width:769px){

#navBar{
top:0;
left:0;
width:100%;
height:52px;
flex-direction:row;
justify-content:center;
gap:16px;
padding:0 20px;
}

.navButton{
font-size:12px;
letter-spacing:1.6px;
padding:8px 12px;
}

}

/* PHONE / TABLET LANDSCAPE — PUT THIS LAST SO IT WINS */

@media (orientation:landscape) and (hover:none) and (pointer:coarse){

#navBar{
top:0;
left:0;
width:160px;
height:100vh;
flex-direction:column;
justify-content:center;
align-items:center;
gap:14px;
padding:20px 10px;
box-sizing:border-box;
background:black;
border-right:1px solid rgba(255,255,255,0.15);
}

.navButton{
font-size:12px;
padding:8px 6px;
text-align:center;
}

#quaField{
top:36px;
left:calc(50% + 40px);
transform:translateX(-50%);
}

}

/* DESKTOP */

@media (min-width:769px){

#navBar{
top:0;
left:0;
width:100%;
height:52px;
flex-direction:row;
justify-content:center;
gap:16px;
padding:0 20px;
}

.navButton{
font-size:12px;
letter-spacing:1.6px;
padding:8px 12px;
}

}

body.landscape-mobile #navBar{

/* NEXT TRACK BUTTON */

#nextTrack{
position:fixed;
bottom:28px;
left:50%;
transform:translateX(-50%);
z-index:10;
}

#nextTrackBtn{
appearance:none;
-webkit-appearance:none;

border:1px solid rgba(0,0,0,0.3);
background:black;
color:white;

font-family:Georgia,serif;
letter-spacing:2px;
font-size:12px;

padding:10px 16px;
cursor:pointer;

transition:transform .25s ease, opacity .25s ease;
}

#nextTrackBtn:hover{

}

</style>
</head>

<div id="tapScreen">
<div>! You've arrived !</div><br>
<div>Enter</div>

</div>

<nav id="navBar">

One is now invited to experience<br>

<script>

/* AUDIO */

const music=document.getElementById("music")
const tapScreen=document.getElementById("tapScreen")
const triangle=document.querySelector(".triangle")
const quaField=document.getElementById("quaField")

music.volume=0.25

const audioCtx=new (window.AudioContext || window.webkitAudioContext)()
const analyser=audioCtx.createAnalyser()
const source=audioCtx.createMediaElementSource(music)

source.connect(analyser)
analyser.connect(audioCtx.destination)

analyser.fftSize=128

const audioData=new Uint8Array(analyser.frequencyBinCount)

let bassLevel=0
let sparkleLevel=0

/* NAV BUTTONS */

const btnAmulets=document.getElementById("btnAmulets")
const btnYoutube=document.getElementById("btnYoutube")
const btnNFTs=document.getElementById("btnNFTs")
const btnGame=document.getElementById("btnGame")

btnAmulets.addEventListener("click",()=>{
alert("Infinity Amuletes section coming soon")
})

btnYoutube.addEventListener("click",()=>{
alert("YouTube section coming soon")
})

btnNFTs.addEventListener("click",()=>{
alert("Music NFTs section coming soon")
})

const nextTrackBtn=document.getElementById("nextTrackBtn")

nextTrackBtn.addEventListener("click",()=>{
window.location.href="track2.html"
})

/* POINTER (mouse + touch) */

let pointer={
x:window.innerWidth/2,
y:window.innerHeight/2
}

window.addEventListener("pointermove",(e)=>{

pointer.x=e.clientX
pointer.y=e.clientY

if(e.pointerType==="touch"){
pointer.y=e.clientY-35
}

})

window.addEventListener("pointerdown",(e)=>{

pointer.x=e.clientX
pointer.y=e.clientY

if(e.pointerType==="touch"){
pointer.y=e.clientY-35
}

})

function updateAudio(){

analyser.getByteFrequencyData(audioData)

let bassSum=0
for(let i=0;i<10;i++){
bassSum+=audioData[i]
}

bassLevel=bassSum/10/255

let sparkleSum=0
for(let i=20;i<40;i++){
sparkleSum+=audioData[i]
}

sparkleLevel=sparkleSum/20/255

requestAnimationFrame(updateAudio)

}

/* TAP SCREEN */

tapScreen.addEventListener("click",()=>{

audioCtx.resume()
music.play()
updateAudio()

tapScreen.style.opacity="0"

setTimeout(()=>{
tapScreen.style.display="none"
},1500)

setTimeout(()=>{
quaField.style.opacity="1"
},900)

setTimeout(()=>{
quaField.style.opacity="0"
},13000)

})

/* TRIANGLE PLAY PAUSE */

function toggleAudio(){

if(audioCtx.state==="suspended"){
audioCtx.resume()
}

if(music.paused){
music.play()
}else{
music.pause()
}

}

triangle.addEventListener("pointerdown",(e)=>{

const rect=triangle.getBoundingClientRect()

const x=e.clientX-rect.left
const y=e.clientY-rect.top

const width=rect.width
const height=rect.height

const leftEdge=(width/2)-(width/2)*(1-y/height)
const rightEdge=(width/2)+(width/2)*(1-y/height)

if(y<0 || y>height || x<leftEdge || x>rightEdge){
return
}

e.preventDefault()
toggleAudio()

})

/* STARFIELD */

const starCanvas=document.getElementById("stars")
const starCtx=starCanvas.getContext("2d")

starCanvas.width=window.innerWidth
starCanvas.height=window.innerHeight

let stars=[]

function buildStars(){
stars=[]
for(let i=0;i<1888;i++){

let direction=Math.random()<0.5?-1:1

stars.push({
x:Math.random()*starCanvas.width,
y:Math.random()*starCanvas.height,
size:Math.random()*2,
speed:(0.1+Math.random()*0.1)*direction
})

}
}

buildStars()

function drawStars(){

starCtx.clearRect(0,0,starCanvas.width,starCanvas.height)

stars.forEach(s=>{

s.y+=s.speed

if(s.y>starCanvas.height){
s.y=0
s.x=Math.random()*starCanvas.width
}

if(s.y<0){
s.y=starCanvas.height
s.x=Math.random()*starCanvas.width
}

let dx=pointer.x-s.x
let dy=pointer.y-s.y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist < 43){
s.x -= dx * 0.068
s.y -= dy * 0.068
}

let glow=(0.36 + sparkleLevel*0.84)

starCtx.beginPath()
starCtx.arc(s.x,s.y,s.size,0,Math.PI*2)
starCtx.fillStyle=`rgba(255,255,255,${glow})`
starCtx.fill()

})

requestAnimationFrame(drawStars)

}

drawStars()

/* TORUS */

function createRing(canvasId,offset,reverse=false,scale=1){

const canvas=document.getElementById(canvasId)
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

class Particle{

constructor(){

this.angle=Math.random()*Math.PI*2
this.radius=(150+Math.random()*40)*scale
this.baseSpeed=(0.0060+Math.random()*0.0060)*(reverse?-1:1)
this.size=Math.random()*2+1

}

update(){

let speed=this.baseSpeed

const centerX=canvas.width/2
const centerY=canvas.height/2+offset

let x=centerX+Math.cos(this.angle)*this.radius
let y=centerY+Math.sin(this.angle)*this.radius*0.35

let dx=pointer.x-x
let dy=pointer.y-y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<180){
speed*=0.43
}

this.angle+=speed

}

draw(){

const centerX=canvas.width/2
const centerY=canvas.height/2+offset

let dynamicRadius=this.radius+bassLevel*35

let x=centerX+Math.cos(this.angle)*dynamicRadius
let y=centerY+Math.sin(this.angle)*dynamicRadius*0.35

ctx.beginPath()
ctx.arc(x,y,this.size,0,Math.PI*2)

ctx.fillStyle="rgba(255,180,220,0.8)"
ctx.shadowBlur=12
ctx.shadowColor="pink"

ctx.fill()

}

}

for(let i=0;i<234;i++){
particles.push(new Particle())
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{
p.update()
p.draw()
})

requestAnimationFrame(animate)

}

animate()

}

createRing("bottomRing",96,false,1.16)
createRing("topRing",-68,true,1)

/* LANDSCAPE MOBILE DETECTOR */

function updateLayoutMode(){

const isMobile = window.innerWidth <= 950
const isLandscape = window.innerWidth > window.innerHeight

if(isMobile && isLandscape){
document.body.classList.add("landscape-mobile")
}else{
document.body.classList.remove("landscape-mobile")
}

}

updateLayoutMode()

window.addEventListener("resize",updateLayoutMode)
window.addEventListener("orientationchange",updateLayoutMode)

/* SIMPLE FUN GAME — CHILL OVER-THE-SHOULDER VERSION */

const sunsetColors = [
"#ff6a88",
"#ff8a8a",
"#ff4fd8",
"#c88bff",
"#ff9a66",
"#ffd2a6"
]

const gameOverlay=document.getElementById("gameOverlay")
const gameCanvas=document.getElementById("gameCanvas")
const gctx=gameCanvas.getContext("2d")

const scoreLine=document.getElementById("scoreLine")
const bestLine=document.getElementById("bestLine")
const restartGameBtn=document.getElementById("restartGameBtn")
const closeGameBtn=document.getElementById("closeGameBtn")
const gameCenterMessage=document.getElementById("gameCenterMessage")
const gameMessageTitle=document.getElementById("gameMessageTitle")
const gameMessageText=document.getElementById("gameMessageText")
const touchLeft=document.getElementById("touchLeft")
const touchRight=document.getElementById("touchRight")

let gameRunning=false
let gameAnimationId=0
let score=0
let bestScore=0
let vortexes=[]
let tunnelRings=[]
let vortexSpawnTimer=0
let lastTime=0
let gameTime=0

const player={
lane:1,
targetLane:1,
x:0,
y:0,
size:34
}

function sizeGameCanvas(){
gameCanvas.width=window.innerWidth
gameCanvas.height=window.innerHeight
}

function getTunnelMetrics(){
const w=gameCanvas.width
const h=gameCanvas.height

return{
centerX:w/2,
horizonY:h*0.07,
playerY:h*0.91,
nearSpread:Math.min(360,w*0.39),
farSpread:Math.min(34,w*0.04)
}
}

function getPlayerLaneX(laneIndex){
return projectLanePosition(laneIndex,0.02).x
}

function projectLanePosition(lane,z){

const m=getTunnelMetrics()

const t=1-z
const depth=Math.pow(t,0.82)

const laneOffset=(lane-1)
const spread=m.farSpread+(m.nearSpread-m.farSpread)*depth

const x=m.centerX + laneOffset*spread
const y=m.horizonY + (m.playerY-m.horizonY)*depth
const scale=0.24 + depth*1.45

return{x,y,scale}
}

function resetGame(){

score=0
vortexes=[]
tunnelRings=[]
vortexSpawnTimer=0
lastTime=0

player.lane=1
player.targetLane=1
player.x=getPlayerLaneX(1)
player.y=getTunnelMetrics().playerY

for(let i=0;i<6;i++){
tunnelRings.push({
z:i/13
})
}

gameRunning=true

gameMessageTitle.textContent="Temple Runner Vortex"
gameMessageText.innerHTML="Dodge the vortexes"
gameCenterMessage.classList.add("hidden")
}

function openGame(){
gameOverlay.classList.add("active")
sizeGameCanvas()
resetGame()
cancelAnimationFrame(gameAnimationId)
gameLoop(0)
}

function closeGame(){
gameRunning=false
cancelAnimationFrame(gameAnimationId)
gameOverlay.classList.remove("active")
}

function moveLeft(){
player.targetLane=Math.max(0,player.targetLane-1)
}

function moveRight(){
player.targetLane=Math.min(2,player.targetLane+1)
}

function spawnVortex(){
const lane=Math.floor(Math.random()*3)

vortexes.push({
lane:lane,
z:1,
spin:0,
spinSpeed:-0.035,
wobblePhase:Math.random()*Math.PI*2,
wobbleSpeed:0.035,
wobbleAmount:8+Math.random()*10,
innerSpin:0,
innerSpinSpeed:-0.08
})
}

function updateGame(delta){

const m=getTunnelMetrics()

player.y=m.playerY

const targetX=getPlayerLaneX(player.targetLane)
player.x += (targetX-player.x)*0.22

const difficulty=Math.min(1.55,1 + score*0.02)
const tunnelSpeed=0.00043 * difficulty

vortexSpawnTimer += delta
if(vortexSpawnTimer > Math.max(540,980 - score*10)){
spawnVortex()
vortexSpawnTimer = 0
}

tunnelRings.forEach(r=>{
r.z -= tunnelSpeed * delta * 0.78
if(r.z < 0){
r.z = 1
}
})

for(let i=vortexes.length-1;i>=0;i--){

const v=vortexes[i]

v.z -= tunnelSpeed * delta * 1.05
v.spin += v.spinSpeed * difficulty
v.wobblePhase += v.wobbleSpeed * difficulty
v.innerSpin += v.innerSpinSpeed * difficulty

const p=projectLanePosition(v.lane,v.z)
const vSize=20 + 70*Math.pow(1-v.z,1.33)

if(v.z < 0){
vortexes.splice(i,1)
score++
continue
}

const dx=player.x-p.x
const dy=player.y-p.y
const dist=Math.sqrt(dx*dx + dy*dy)

if(v.z < 0.16 && dist < vSize + player.size*0.46){
gameOver()
return
}
}

scoreLine.textContent="Score: " + score
bestLine.textContent="Best: " + bestScore
}

function drawTrianglePlayer(){

gctx.save()
gctx.translate(player.x,player.y)

const grad=gctx.createLinearGradient(0,player.size*1.0,0,-player.size*1.25)
grad.addColorStop(0,"#a06bff")
grad.addColorStop(0.45,"#ff4fd8")
grad.addColorStop(1,"#ff9a66")

gctx.beginPath()
gctx.moveTo(0,-player.size*1.25)
gctx.lineTo(-player.size*0.72,player.size*0.95)
gctx.lineTo(player.size*0.72,player.size*0.95)
gctx.closePath()

gctx.fillStyle=grad
gctx.shadowBlur=22
gctx.shadowColor="rgba(255,120,210,0.65)"
gctx.fill()

gctx.beginPath()
gctx.moveTo(0,-player.size*0.72)
gctx.lineTo(-player.size*0.2,player.size*0.16)
gctx.lineTo(player.size*0.2,player.size*0.16)
gctx.closePath()
gctx.fillStyle="rgba(255,255,255,0.22)"
gctx.fill()

gctx.restore()
}

function drawTunnelBackground(){

const w=gameCanvas.width
const h=gameCanvas.height
const m=getTunnelMetrics()

gctx.clearRect(0,0,w,h)

const bg=gctx.createLinearGradient(0,0,0,h)
bg.addColorStop(0,"rgba(18,0,28,1)")
bg.addColorStop(0.32,"rgba(10,0,18,1)")
bg.addColorStop(0.68,"rgba(4,0,8,1)")
bg.addColorStop(1,"rgba(0,0,0,1)")
gctx.fillStyle=bg
gctx.fillRect(0,0,w,h)

const glow=gctx.createRadialGradient(
m.centerX,m.horizonY,8,
m.centerX,m.playerY,h*1.08
)
glow.addColorStop(0,"rgba(255,120,190,0.22)")
glow.addColorStop(0.34,"rgba(180,90,255,0.11)")
glow.addColorStop(0.76,"rgba(80,40,140,0.05)")
glow.addColorStop(1,"rgba(0,0,0,0)")
gctx.fillStyle=glow
gctx.fillRect(0,0,w,h)

for(let lane=0;lane<3;lane++){

const top=projectLanePosition(lane,1)
const bottom=projectLanePosition(lane,0.02)

gctx.beginPath()
gctx.moveTo(top.x,top.y)
gctx.lineTo(bottom.x,bottom.y)
gctx.strokeStyle="rgba(255,255,255,0.1)"
gctx.lineWidth=2.2
gctx.stroke()
}

tunnelRings.forEach(r=>{

const p=projectLanePosition(1,r.z)
const depth=Math.pow(1-r.z,1.1)
const radius=Math.max(10,16 + depth*Math.min(w,h)*0.56)
const alpha=0.24 - depth*0.09

gctx.beginPath()
gctx.arc(m.centerX,p.y,radius,0,Math.PI*2)
const color = sunsetColors[Math.floor((r.z*10 + gameTime*0.0005) % sunsetColors.length)]

gctx.strokeStyle = color
gctx.globalAlpha = Math.max(0.05,alpha)
gctx.lineWidth=2 + depth*1.2
gctx.stroke()
gctx.globalAlpha = 1
})

gctx.beginPath()
gctx.arc(m.centerX,m.horizonY,16,0,Math.PI*2)
gctx.fillStyle="rgba(255,255,255,0.18)"
gctx.fill()
}

function drawVortex(v){

const p=projectLanePosition(v.lane,v.z)
const size=20 + 70*Math.pow(1-v.z,1.33)
const alpha=0.32 + (1-v.z)*0.58

const twirlX=Math.sin(v.spin*1.4 + v.wobblePhase) * v.wobbleAmount * (1-v.z)
const twirlY=Math.cos(v.spin*0.9 + v.wobblePhase) * v.wobbleAmount * 0.35 * (1-v.z)

gctx.save()
gctx.translate(p.x + twirlX, p.y + twirlY)
gctx.rotate(v.spin)

/* OUTER RINGS */

for(let i=0;i<4;i++){

const r=size-(i*size*0.18)

const ringGrad=gctx.createLinearGradient(-r,-r,r,r)
ringGrad.addColorStop(0,`rgba(255,106,136,${Math.max(0.16,alpha-(i*0.12))})`)
ringGrad.addColorStop(0.35,`rgba(255,79,216,${Math.max(0.16,alpha-(i*0.14))})`)
ringGrad.addColorStop(0.7,`rgba(160,107,255,${Math.max(0.14,alpha-(i*0.16))})`)
ringGrad.addColorStop(1,`rgba(255,190,220,${Math.max(0.12,alpha-(i*0.18))})`)

gctx.beginPath()
gctx.arc(0,0,r,0,Math.PI*2)
gctx.strokeStyle=ringGrad
gctx.lineWidth=Math.max(2,size*0.07)
gctx.lineCap="round"
gctx.shadowBlur=14
gctx.shadowColor="pink"
gctx.stroke()

gctx.rotate(0.6)
}

/* PHI-LIKE INNER SPIRALS */

for(let s=0;s<3;s++){

gctx.save()
gctx.rotate(v.innerSpin + s*(Math.PI*2/3))

const startT=0.55
const endT=6.9
const baseRadius=size*0.11
const growth=0.16

gctx.beginPath()

let firstPoint=true

for(let t=startT;t<=endT;t+=0.08){

const spiralRadius=baseRadius * Math.exp(growth*(t-startT))

if(spiralRadius > size*0.72) break

const x=Math.cos(t) * spiralRadius
const y=Math.sin(t) * spiralRadius * 0.92

if(firstPoint){
gctx.moveTo(x,y)
firstPoint=false
}else{
gctx.lineTo(x,y)
}

}

gctx.strokeStyle=`rgba(255,255,255,${Math.max(0.16,alpha*0.95)})`
gctx.lineWidth=Math.max(1.4,size*0.03)
gctx.lineCap="round"
gctx.shadowBlur=10
gctx.shadowColor="rgba(255,255,255,0.85)"
gctx.stroke()

gctx.restore()
}

/* CORE */

const coreGrad=gctx.createRadialGradient(0,0,1,0,0,size*0.24)
coreGrad.addColorStop(0,"rgba(255,255,255,0.98)")
coreGrad.addColorStop(0.45,"rgba(255,210,240,0.9)")
coreGrad.addColorStop(1,"rgba(255,120,210,0)")

gctx.beginPath()
gctx.arc(0,0,size*0.15,0,Math.PI*2)
gctx.fillStyle=coreGrad
gctx.fill()

gctx.restore()
}

function drawGame(){
drawTunnelBackground()
vortexes.forEach(drawVortex)
drawTrianglePlayer()
}

function gameLoop(timestamp){

if(!gameRunning){
drawGame()
return
}

if(!lastTime){
lastTime=timestamp
}

const delta=timestamp-lastTime
lastTime=timestamp
gameTime=timestamp

updateGame(delta)
drawGame()

gameAnimationId=requestAnimationFrame(gameLoop)
}

function gameOver(){
gameRunning=false
bestScore=Math.max(bestScore,score)
bestLine.textContent="Best: " + bestScore

gameMessageTitle.textContent="Game Over"
gameMessageText.innerHTML="Score: " + score + "<br>Tap Restart to go again"
gameCenterMessage.classList.remove("hidden")
}

btnGame.addEventListener("click",()=>{
openGame()
})

restartGameBtn.addEventListener("click",()=>{
resetGame()
cancelAnimationFrame(gameAnimationId)
gameLoop(0)
})

closeGameBtn.addEventListener("click",()=>{
closeGame()
})

window.addEventListener("keydown",(e)=>{

if(!gameOverlay.classList.contains("active")){
return
}

if(e.key==="ArrowLeft"){
e.preventDefault()
moveLeft()
}

if(e.key==="ArrowRight"){
e.preventDefault()
moveRight()
}

if(e.key==="Escape"){
e.preventDefault()
closeGame()
}

})

touchLeft.addEventListener("pointerdown",(e)=>{
e.preventDefault()
moveLeft()
})

touchRight.addEventListener("pointerdown",(e)=>{
e.preventDefault()
moveRight()
})

/* RESIZE */

window.addEventListener("resize",()=>{

starCanvas.width=window.innerWidth
starCanvas.height=window.innerHeight
buildStars()
updateLayoutMode()
sizeGameCanvas()

})

window.addEventListener("orientationchange",()=>{

setTimeout(()=>{
updateLayoutMode()
sizeGameCanvas()
},120)

})

</script>
